<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kristal — Handmade Protective Jewelry</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FFFFFF;
  --warm:#F9F9F9;
  --gold:#B8965A;
  --gold-light:#D4B078;
  --dark:#1C1812;
  --mid:#4A4035;
  --muted:#8C7E6E;
  --white:#FFFFFF;
}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden}

/* ANNOUNCEMENT BAR */
.announce{background:var(--dark);color:var(--gold-light);text-align:center;padding:10px;font-size:12px;letter-spacing:0.2em;text-transform:uppercase}

/* NAV */
nav{background:var(--white);border-bottom:1px solid rgba(184,150,90,0.2);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:72px}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{text-decoration:none;color:var(--mid);font-size:13px;letter-spacing:0.12em;text-transform:uppercase;transition:color 0.2s}
.nav-links a:hover{color:var(--gold)}

/* Premium Uppercase Logo Style */
.logo{text-align:center;flex:1}
.logo h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;letter-spacing:0.3em;color:var(--dark);text-transform:uppercase}

.nav-icons{display:flex;gap:20px;align-items:center}
.nav-icons a{color:var(--mid);text-decoration:none;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:color 0.2s}
.nav-icons a:hover{color:var(--gold)}

/* Clean Inline Language Switcher */
.lang-switcher{display:flex;gap:8px;align-items:center}
.lang-btn{background:none;border:1px solid rgba(184,150,90,0.3);color:var(--muted);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.15em;padding:5px 10px;cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.lang-btn:hover, .lang-btn.active{border-color:var(--gold);color:var(--gold)}

.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{width:24px;height:1.5px;background:var(--dark);display:block;transition:all 0.3s}
.mobile-menu{display:none;position:fixed;top:72px;left:0;right:0;background:var(--white);border-bottom:1px solid rgba(184,150,90,0.2);z-index:99;padding:24px 40px;flex-direction:column;gap:20px}
.mobile-menu.open{display:flex}
.mobile-menu a{text-decoration:none;color:var(--mid);font-size:13px;letter-spacing:0.15em;text-transform:uppercase;padding:8px 0;border-bottom:1px solid rgba(184,150,90,0.1)}
.mobile-lang-selectors { display: flex; gap: 10px; margin-top: 10px; }
.mobile-lang-selectors button { background: none; border: 1px solid #ddd; padding: 5px 10px; font-size: 12px; cursor: pointer; }

/* HERO (White Elegant Version) */
.hero{position:relative;height:80vh;min-height:500px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#FFFFFF;border-bottom:1px solid #F0F0F0}
.hero-content{position:relative;z-index:2;text-align:center;padding:0 20px}
.hero-eyebrow{color:var(--gold);font-size:12px;letter-spacing:0.35em;text-transform:uppercase;margin-bottom:24px}
.hero h2{font-family:'Cormorant Garamond',serif;font-size:clamp(44px,7vw,80px);font-weight:300;color:var(--dark);line-height:1.1;margin-bottom:24px}
.hero h2 em{color:var(--gold);font-style:italic}
.hero p{color:var(--muted);font-size:16px;max-width:520px;margin:0 auto 40px;line-height:1.7}
.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--dark);color:var(--white);padding:14px 36px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;transition:all 0.3s;font-family:'Jost',sans-serif;display:inline-block}
.btn-primary:hover{background:var(--gold);transform:translateY(-1px)}
.btn-outline{border:1px solid var(--dark);color:var(--dark);padding:14px 36px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;transition:all 0.3s;font-family:'Jost',sans-serif;display:inline-block}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}

/* MARQUEE */
.marquee-wrap{background:var(--dark);padding:14px 0;overflow:hidden}
.marquee-track{display:flex;white-space:nowrap;animation:marquee 20s linear infinite}
.marquee-item{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-light);padding:0 40px;font-weight:400}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SECTIONS */
.section{max-width:1300px;margin:0 auto;padding:80px 40px}
.section-header{text-align:center;margin-bottom:56px}
.section-eyebrow{color:var(--gold);font-size:11px;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:12px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4vw,52px);font-weight:300;color:var(--dark);line-height:1.2}
.section-title em{font-style:italic;color:var(--gold)}

/* CATEGORIES */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.cat-card{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:3/4}
.cat-bg{position:absolute;inset:0;transition:transform 0.6s ease;background:#F9F9F9;border:1px solid #EEE;}
.cat-card:hover .cat-bg{transform:scale(1.03)}
.cat-symbol{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:48px;opacity:0.8}
.cat-content{position:absolute;bottom:0;left:0;right:0;padding:20px;text-align:center;background:#FFFFFF}
.cat-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--dark);letter-spacing:0.05em}
.cat-count{color:var(--muted);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;margin-top:4px}

/* PRODUCTS */
.products-section{background:var(--white);padding:40px 0}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;max-width:1300px;margin:0 auto}
.prod-card{position:relative;cursor:pointer;background:#FFFFFF;border:1px solid #F0F0F0;transition:all 0.3s}
.prod-card:hover {box-shadow: 0 10px 25px rgba(0,0,0,0.05);}
.prod-img{aspect-ratio:1;overflow:hidden;position:relative;background:#FAFAFA;display:flex;align-items:center;justify-content:center;}
.prod-visual{font-size:70px;transition:transform 0.5s ease}
.prod-card:hover .prod-visual{transform:scale(1.08)}
.prod-badge{position:absolute;top:16px;left:16px;background:var(--gold);color:var(--white);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 10px}
.prod-info{padding:20px 24px 16px;text-align:center}
.prod-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--dark);margin-bottom:6px}
.prod-sub{color:var(--muted);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px}
.prod-price{display:flex;align-items:baseline;justify-content:center;gap:10px;flex-wrap:wrap}
.price-now{font-size:18px;font-weight:500;color:var(--dark)}
.price-was{font-size:14px;color:var(--muted);text-decoration:line-through}

.add-btn{display:block;width:calc(100% - 48px);margin:10px 24px 24px;background:var(--dark);border:1px solid var(--dark);color:var(--white);padding:12px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;transition:all 0.3s;}
.add-btn:hover{background:var(--gold);border-color:var(--gold)}

/* RITUAL */
.ritual{background:#FAFAFA;padding:100px 40px;text-align:center;border-top:1px solid #F0F0F0;border-bottom:1px solid #F0F0F0}
.ritual h2{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,56px);font-weight:300;color:var(--dark);margin-bottom:20px}
.ritual h2 em{color:var(--gold);font-style:italic}
.ritual p{color:var(--muted);font-size:16px;max-width:540px;margin:0 auto 40px;line-height:1.8}

/* TRUST */
.trust{padding:64px 40px;background:#FFFFFF}
.trust-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:32px;text-align:center}
.trust-icon{font-size:32px;margin-bottom:12px}
.trust-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--dark);margin-bottom:4px}
.trust-desc{color:var(--muted);font-size:13px;line-height:1.5}

/* NEWSLETTER */
.newsletter{background:var(--dark);padding:80px 40px;text-align:center}
.newsletter h2{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--white);margin-bottom:12px}
.newsletter p{color:rgba(255,255,255,0.45);margin-bottom:36px;font-size:15px}
.nl-form{display:flex;max-width:480px;margin:0 auto}
.nl-form input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-right:none;color:var(--white);padding:14px 20px;font-family:'Jost',sans-serif;font-size:14px;outline:none}
.nl-form input::placeholder{color:rgba(255,255,255,0.3)}
.nl-form button{background:var(--gold);color:var(--dark);border:none;padding:14px 28px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;font-weight:500;transition:background 0.2s;white-space:nowrap}
.nl-form button:hover{background:var(--gold-light)}

/* FOOTER */
footer{background:#111111;padding:60px 40px 32px;color:rgba(255,255,255,0.4)}
.footer-inner{max-width:1300px;margin:0 auto}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:48px}
.footer-brand h3{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--white);margin-bottom:16px}
.footer-brand p{font-size:13px;line-height:1.7;max-width:280px}
.footer-bottom{border-top:1px solid rgba(255,255,255,0.08);padding-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:12px;flex-wrap:wrap;gap:16px}

/* RESPONSIVE */
@media(max-width:900px){
  .cat-grid{grid-template-columns:repeat(2,1fr)}
  .prod-grid{grid-template-columns:repeat(2,1fr)}
  .trust-inner{grid-template-columns:repeat(2,1fr)}
  .footer-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .nav-inner{padding:0 20px}
  .section{padding:60px 20px}
  .cat-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .prod-grid{grid-template-columns:1fr}
  .trust-inner{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <ul class="nav-links">
      <li><a href="#bestsellers">Best Sellers</a></li>
      <li><a href="#collections">Malas</a></li>
      <li><a href="#collections">Bracelets</a></li>
    </ul>
    
    <div class="logo"><h1>Kristal</h1></div>
    
    <div class="nav-icons">
      <a href="#" id="cart-link">კალათა (0)</a>

        <button class="lang-btn" onclick="setLang('kk', this)">Қаз</button>
      </div>
    </div>
    
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button
